async function deploy() {
  const log = document.getElementById('log');
  function l(msg) { log.textContent += '\n' + msg; console.log(msg); }

  try {
    l('Step 1: Creating blob...');
    const blobR = await fetch('https://api.github.com/repos/warrmarr/bsp-bot/git/blobs', {
      method: 'POST',
      headers: { Authorization: 'token ' + TOK, 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: B64, encoding: 'base64' })
    });
    const blob = await blobR.json();
    l('Blob SHA: ' + blob.sha);

    l('Step 2: Getting HEAD...');
    const refR = await fetch('https://api.github.com/repos/warrmarr/bsp-bot/git/ref/heads/main', {
      headers: { Authorization: 'token ' + TOK }
    });
    const ref = await refR.json();
    const commitSha = ref.object.sha;
    l('HEAD: ' + commitSha);

    l('Step 3: Getting commit...');
    const commitR = await fetch('https://api.github.com/repos/warrmarr/bsp-bot/git/commits/' + commitSha, {
      headers: { Authorization: 'token ' + TOK }
    });
    const commit = await commitR.json();

    l('Step 4: Creating tree...');
    const treeR = await fetch('https://api.github.com/repos/warrmarr/bsp-bot/git/trees', {
      method: 'POST',
      headers: { Authorization: 'token ' + TOK, 'Content-Type': 'application/json' },
      body: JSON.stringify({base_tree: commit.tree.sha, tree: [{path: 'main.ts', mode: '100644', type: 'blob', sha: blob.sha}]})
    });
    const tree = await treeR.json();

    l('Step 5: Creating commit...');
    const newCommitR = await fetch('https://api.github.com/repos/warrmarr/bsp-bot/git/commits', {
      method: 'POST',
      headers: { Authorization: 'token ' + TOK, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'v4.3.1-clean: remove broadcast/nurture/followup', tree: tree.sha, parents: [commitSha] })
    });
    const newCommit = await newCommitR.json();

    l('Step 6: Updating ref...');
    const updateR = await fetch('https://api.github.com/repos/warrmarr/bsp-bot/git/refs/heads/main', {
      method: 'PATCH',
      headers: { Authorization: 'token ' + TOK, 'Content-Type': 'application/json' },
      body: JSON.stringify({ sha: newCommit.sha })
    });
    const result = await updateR.json();
    l('✅ Done! New HEAD: ' + result.object.sha);
  } catch (e) {
    l('❌ Error: ' + e.message);
  }
}
